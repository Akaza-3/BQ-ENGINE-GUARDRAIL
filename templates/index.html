/* ── Formatters ─────────────────────────────────────────── */
const usd0 = n => '$' + Math.round(n).toLocaleString('en-US');
const usd2 = n => '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
const pct  = n => Number(n).toFixed(1) + '%';

const SQL_KEYWORDS = ['SELECT','FROM','JOIN','LEFT JOIN','INNER JOIN','ON','WHERE','AND','OR','GROUP BY','ORDER BY','LIMIT','AS','BETWEEN','CURRENT_DATE','DATE_SUB','INTERVAL','COUNT','SUM','AVG','DESC','ASC','HAVING','NOT','IN','IS','NULL','CASE','WHEN','THEN','ELSE','END'];

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function formatBytes(bytes) {
    const kb = 1024, mb = kb*1024, gb = mb*1024, tb = gb*1024;
    if (bytes >= tb) return `${(bytes/tb).toFixed(2)} TB`;
    if (bytes >= gb) return `${(bytes/gb).toFixed(2)} GB`;
    if (bytes >= mb) return `${(bytes/mb).toFixed(2)} MB`;
    if (bytes >= kb) return `${(bytes/kb).toFixed(2)} KB`;
    return `${bytes} B`;
}

function highlightSql(sql) {
  let out = escapeHtml(sql);

  const strs = [];
  out = out.replace(/'[^']*'/g, m => {
    strs.push(m);
    return '\u0000' + String.fromCharCode(65 + strs.length - 1) + '\u0000';
  });

  out = out.replace(/(`[^`]+`)/g, '<span class="str">$1</span>');
  const kwPattern = new RegExp('\\b(' + SQL_KEYWORDS.join('|').replace(/ /g, '\\s+') + ')\\b', 'gi');
  out = out.replace(kwPattern, m => '<span class="kw">' + m.toUpperCase() + '</span>');
  out = out.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="num">$1</span>');

  out = out.replace(/\u0000([A-Z])\u0000/g,
    (_, ch) => '<span class="str">' + strs[ch.charCodeAt(0) - 65] + '</span>');

  return out;
}

function formatCost(cost){
    if(cost >= 1) return `$${cost.toFixed(2)}`;
    return `$${cost.toFixed(4)}`;
}

function getBadges(explanation){
    const text = explanation.toLowerCase();
    const badges = [];
    if(text.includes("partition")) badges.push("Partition Pruning");
    if(text.includes("column")) badges.push("Column Pruning");
    if(text.includes("cluster")) badges.push("Cluster Pruning");
    if(text.includes("select *")) badges.push("Removed SELECT *");
    if(text.includes("filter")) badges.push("Predicate Pushdown");
    badges.push("Context Verified");
    return badges;
}

function formatSql(sql) {
  return sql
    .replace(/\s+(FROM|WHERE|GROUP BY|ORDER BY|LIMIT|HAVING)\s+/gi, '\n$1 ')
    .replace(/\s+(JOIN|LEFT JOIN|INNER JOIN)\s+/gi, '\n$1 ')
    .replace(/\s+(ON)\s+/gi, '\n  $1 ')
    .replace(/\s+(AND|OR)\s+/gi, '\n  $1 ')
    .trim();
}

    const c = isHigh ? 'red' : 'amber';

      <div class="rounded-lg border border-${c}-500/25 bg-${c}-500/[0.04] p-4">

  }).join('');

  return `

            Beam pipeline risks · ${risks.length} type mismatch${risks.length > 1 ? 'es' : ''} detected

          ${medCount  > 0 ? `<span class="mono text-[10px] px-2 py-0.5 rounded bg-amber-500/15 border border-amber-500/30 text-amber-400 ${highCount ? '' : 'ml-auto'}">${medCount} MEDIUM</span>` : ''}
        </div>
        <div class="p-4 space-y-3">${rows}</div>
      </div>
    </div>`;
}

    const annualOrig = q.original_cost_per_run * q.runs_per_day * 365;
    const annualOpt  = q.optimized_cost_per_run * q.runs_per_day * 365;
    const tbRatio = (q.optimized_bytes_scanned / q.original_bytes_scanned) * 100;
    const risks = q.risks || [];
    return `
    <div class="panel rounded-xl overflow-hidden card-hover fade-in" style="animation-delay:${i * 70}ms">

      <!-- Summary header (clickable) -->
      <button class="w-full text-left px-5 py-4 flex flex-wrap items-center gap-4 hover:bg-white/[0.015] transition" data-toggle="${q.query_id}">
        <div class="flex items-center gap-3 min-w-[260px] flex-1">
          <div class="w-8 h-8 rounded-lg bg-slate-800 border border-slate-700 flex items-center justify-center shrink-0">
            <i data-lucide="file-terminal" class="w-4 h-4 text-slate-400"></i>
          </div>
          <div class="min-w-0">
            <div class="mono text-[13px] font-medium text-slate-100 truncate">${escapeHtml(q.file_name)}</div>
            <div class="flex items-center gap-1.5 mt-0.5">
              <i data-lucide="workflow" class="w-3 h-3 text-slate-600"></i>
              <span class="mono text-[11px] text-slate-500">${escapeHtml(q.dag_task_id)}</span>
              <span class="text-slate-700 text-[11px]">·</span>
              <span class="mono text-[11px] text-slate-500">${q.runs_per_day}× / day</span>
            </div>
          </div>
        </div>

        <div class="flex items-center gap-5 sm:gap-7">
          ${risks.length > 0 ? `
          <div class="flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-amber-500/10 border border-amber-500/30">
            <i data-lucide="triangle-alert" class="w-3 h-3 text-amber-400"></i>
            <span class="mono text-[11px] font-semibold text-amber-400">${risks.length} Risk${risks.length > 1 ? 's' : ''}</span>
          </div>` : ''}
          <div class="text-right">
            <div class="text-[10px] uppercase tracking-wider text-slate-600 mb-0.5">Original / yr</div>
            <div class="mono text-[14px] font-medium text-red-400">${usd0(annualOrig)}</div>
          </div>
          <i data-lucide="arrow-right" class="w-4 h-4 text-slate-700 shrink-0"></i>
          <div class="text-right">
            <div class="text-[10px] uppercase tracking-wider text-slate-600 mb-0.5">Optimized / yr</div>
            <div class="mono text-[14px] font-medium text-green-400">${usd0(annualOpt)}</div>
          </div>
          <div class="px-2.5 py-1 rounded-md bg-green-500/10 border border-green-500/30">
            <span class="mono text-[13px] font-semibold text-green-400">−${pct(q.individual_savings_percent)}</span>
          </div>
          <i data-lucide="chevron-down" class="chev w-4 h-4 text-slate-500 shrink-0" data-chev="${q.query_id}"></i>
        </div>
      </button>

      <!-- Expandable detail -->
      <div class="accordion-body border-t border-[#1e2836]" data-body="${q.query_id}">
        <div class="p-5 space-y-4">

          <!-- Dry run metrics strip -->
          <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
            <div class="sunken rounded-lg p-3.5">
              <div class="text-[10px] uppercase tracking-wider text-slate-600 mb-1.5">Original Scan Size</div>
              <div class="mono text-[17px] font-semibold text-red-400">${formatBytes(q.original_bytes_scanned)}</div>
              <div class="w-full h-1 rounded-full bg-slate-800 mt-2.5 overflow-hidden">
                <div class="h-full rounded-full bg-red-500" style="width:100%"></div>
              </div>
            </div>
            <div class="sunken rounded-lg p-3.5">
              <div class="text-[10px] uppercase tracking-wider text-slate-600 mb-1.5">Optimized Scan Size</div>
              <div class="mono text-[17px] font-semibold text-green-400">${formatBytes(q.optimized_bytes_scanned)}</div>
              <div class="w-full h-1 rounded-full bg-slate-800 mt-2.5 overflow-hidden">
                <div class="bar-fill h-full rounded-full bg-green-500" style="width:0%" data-target="${tbRatio}"></div>
              </div>
            </div>
            <div class="sunken rounded-lg p-3.5">
              <div class="text-[10px] uppercase tracking-wider text-slate-600 mb-1.5">Cost per run — before</div>
              <div class="mono text-[17px] font-semibold text-red-400">${formatCost(q.original_cost_per_run)}</div>
              <div class="text-[10px] text-slate-600 mt-2 mono">${usd0(annualOrig)} annualized</div>
            </div>
            <div class="sunken rounded-lg p-3.5">
              <div class="text-[10px] uppercase tracking-wider text-slate-600 mb-1.5">Cost per run — after</div>
              <div class="mono text-[17px] font-semibold text-green-400">${formatCost(q.optimized_cost_per_run)}</div>
              <div class="text-[10px] text-slate-600 mt-2 mono">${usd0(annualOpt)} annualized</div>
            </div>
          </div>

          <!-- Risk panel -->
          ${renderRisks(risks, q.query_id)}

          <!-- Side-by-side SQL diff -->
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-3">
            <div class="sunken rounded-lg overflow-hidden">
              <div class="px-3.5 py-2 border-b border-[#1e2836] flex items-center justify-between bg-red-500/[0.04]">
                <div class="flex items-center gap-2">
                  <i data-lucide="minus-circle" class="w-3.5 h-3.5 text-red-400"></i>
                  <span class="text-[11px] font-medium text-red-400 uppercase tracking-wider">Original SQL</span>
                </div>
                <span class="mono text-[10px] text-slate-600">${formatBytes(q.original_bytes_scanned)}</span>
              </div>
              <div class="p-3.5 overflow-x-auto">
                <pre class="mono text-[11.5px] leading-[1.75] text-slate-300">${highlightSql(formatSql(q.original_sql))}</pre>
              </div>
            </div>
            <div class="sunken rounded-lg overflow-hidden">
              <div class="px-3.5 py-2 border-b border-[#1e2836] flex items-center justify-between bg-green-500/[0.04]">
                <div class="flex items-center gap-2">
                  <i data-lucide="plus-circle" class="w-3.5 h-3.5 text-green-400"></i>
                  <span class="text-[11px] font-medium text-green-400 uppercase tracking-wider">Gemini rewritten SQL</span>
                </div>
                <span class="mono text-[10px] text-slate-600">${formatBytes(q.optimized_bytes_scanned)}</span>
              </div>
              <div class="p-3.5 overflow-x-auto">
                <pre class="mono text-[11.5px] leading-[1.75] text-slate-300">${highlightSql(formatSql(q.optimized_sql))}</pre>
              </div>
            </div>
          </div>

          <!-- AI reasoning box -->
          <div class="rounded-lg border border-green-500/25 bg-green-500/[0.05] p-4">
            <div class="flex items-center gap-2 mb-2">
              <i data-lucide="brain-circuit" class="w-4 h-4 text-green-400"></i>
              <span class="text-[11px] font-medium text-green-400 uppercase tracking-[0.09em]">Gemini reasoning — structural fix applied</span>
            </div>
            <p class="text-[12.5px] leading-relaxed text-green-200/80">${escapeHtml(q.ai_explanation)}</p>
            <div class="flex flex-wrap gap-2 mt-3">
              ${getBadges(q.ai_explanation).map(badge => `
                <span class="mono text-[10px] px-2 py-1 rounded bg-green-500/10 border border-green-500/20 text-green-400">${badge}</span>
              `).join("")}
            </div>
          </div>

        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── Render: Context verification footer ────────────────── */
function renderContextFooter(cv) {
  const cache = cv.vertex_cache ?? {
      status: "N/A",
      token_count: 0,
      read_cost: 0,
      storage_cost_per_hour: 0
  };
  const items = [
    { icon: 'database',     label: 'BigQuery schemas checked',  value: cv.bq_schemas_checked,       note: 'Partition + cluster metadata resolved' },
    { icon: 'file-json',    label: 'Avro mappings matched',     value: cv.avro_mappings_matched,    note: 'No downstream schema breakage detected' },
    { icon: 'file-code',    label: 'Dataflow logic validated',  value: cv.dataflow_logic_validated, note: 'Column references cross-checked in Java' },
    { icon: 'brain-circuit',label: 'Vertex AI Context Cache',   value: `${cache.status} • ${cache.token_count.toLocaleString()} tokens`, note: `Read: $${cache.read_cost.toFixed(6)} · Storage: $${cache.storage_cost_per_hour.toFixed(6)}/hr` }
  ];

  document.getElementById('contextFooter').innerHTML = `
    <div class="panel rounded-2xl p-5">
      <div class="flex items-center gap-2 mb-4">
        <i data-lucide="shield-check" class="w-4 h-4 text-sky-400"></i>
        <h2 class="text-[12px] font-medium uppercase tracking-[0.1em] text-slate-400">Vertex AI context cache verification</h2>
        <span class="mono text-[10px] px-2 py-0.5 rounded bg-sky-500/10 border border-sky-500/25 text-sky-400 ml-1">
            ${cache.status} · ${cache.token_count.toLocaleString()} tokens
        </span>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        ${items.map(it => `
          <div class="sunken rounded-lg p-4">
            <div class="flex items-start gap-3">
              <div class="w-7 h-7 rounded-md bg-green-500/10 border border-green-500/25 flex items-center justify-center shrink-0 mt-0.5">
                <i data-lucide="check" class="w-3.5 h-3.5 text-green-400"></i>
              </div>
              <div class="min-w-0">
                <div class="flex items-center gap-1.5 mb-1">
                  <i data-lucide="${it.icon}" class="w-3 h-3 text-slate-600"></i>
                  <span class="text-[11px] text-slate-500">${it.label}</span>
                </div>
                <div class="mono text-[12px] font-medium text-green-400 break-words">${escapeHtml(it.value)}</div>
                <div class="text-[10.5px] text-slate-600 mt-1">${it.note}</div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

/* ── Toggle risk panel ──────────────────────────────────── */
function toggleRisk(e, queryId) {
  e.stopPropagation();
  const body = document.getElementById(`risk-body-${queryId}`);
  const chev = document.getElementById(`risk-chev-${queryId}`);
  const opening = !body.classList.contains('open');
  body.classList.toggle('open', opening);
  chev.classList.toggle('open', opening);
  if (opening && window.lucide) lucide.createIcons();
}

/* ── Accordion wiring ───────────────────────────────────── */
function wireAccordions() {
  document.querySelectorAll('[data-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id   = btn.getAttribute('data-toggle');
      const body = document.querySelector(`[data-body="${id}"]`);
      const chev = document.querySelector(`[data-chev="${id}"]`);
      const opening = !body.classList.contains('open');
      body.classList.toggle('open', opening);
      chev.classList.toggle('open', opening);
      if (opening) setTimeout(animateBars, 60);
    });
  });

  document.getElementById('expandAll').addEventListener('click', () => {
    document.querySelectorAll('.accordion-body').forEach(b => b.classList.add('open'));
    document.querySelectorAll('.chev').forEach(c => c.classList.add('open'));
    setTimeout(animateBars, 60);
  });
  document.getElementById('collapseAll').addEventListener('click', () => {
    document.querySelectorAll('.accordion-body').forEach(b => b.classList.remove('open'));
    document.querySelectorAll('.chev').forEach(c => c.classList.remove('open'));
    document.querySelectorAll('.risk-body').forEach(b => b.classList.remove('open'));
    document.querySelectorAll('.risk-chev').forEach(c => c.classList.remove('open'));
  });
}

/* ── Animate progress bars ──────────────────────────────── */
function animateBars() {
  document.querySelectorAll('.bar-fill[data-target]').forEach(bar => {
    const t = Math.min(100, Math.max(0, parseFloat(bar.getAttribute('data-target')) || 0));
    requestAnimationFrame(() => { bar.style.width = t + '%'; });
  });
}

/* ── Toast helper ───────────────────────────────────────── */
function toast(msg, icon = 'check-circle', tone = 'green') {
  const host = document.getElementById('toastHost');
  const el = document.createElement('div');
  el.className = `flex items-center gap-2.5 px-4 py-3 rounded-lg bg-[#121824] border border-${tone}-500/35 shadow-xl fade-in`;
  el.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4 text-${tone}-400"></i><span class="text-[12.5px] text-slate-200">${escapeHtml(msg)}</span>`;
  host.appendChild(el);
  if (window.lucide) lucide.createIcons();
  setTimeout(() => { el.style.transition = 'opacity 300ms'; el.style.opacity = '0'; setTimeout(() => el.remove(), 320); }, 3200);
}

/* ── Action handlers ────────────────────────────────────── */
function approveRelease() {
  const d = RELEASE_DATA;
  toast(`${d.release_id} approved — merging ${d.branch} into main`, 'git-merge', 'green');
}
function downloadReport() {
  const d = RELEASE_DATA;
  const blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `po_cost_audit_${d.release_id}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('PO cost audit payload exported', 'file-down', 'sky');
}
function rerunAnalysis() {
  toast('Dry run re-queued — 3 queries submitted to BigQuery', 'refresh-cw', 'sky');
  document.querySelectorAll('.bar-fill').forEach(b => b.style.width = '0%');
  setTimeout(animateBars, 220);
}

/* ── Boot ───────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', async () => {
  let data = RELEASE_DATA;

  try {
    const res = await fetch('/api/latest-report', { cache: 'no-store' });
    if (res.ok) {
      const live = await res.json();
      if (live && live.queries && live.queries.length) data = live;
    }
  } catch (_) {}

  renderBanner(data);
  renderQueries(data.queries);
  renderContextFooter(data.context_verification);
  wireAccordions();

  if (window.lucide) lucide.createIcons();

  const first = data.queries[0];
  if (first) {
    document.querySelector(`[data-body="${first.query_id}"]`)?.classList.add('open');
    document.querySelector(`[data-chev="${first.query_id}"]`)?.classList.add('open');
  }

  setTimeout(animateBars, 180);

  const stamp = new Date().toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' });
  document.getElementById('footerStamp').textContent = `Last dry run · ${stamp}`;
  document.getElementById('liveClock').textContent = `Analysis complete · ${data.queries.length} queries`;
});
</script>
</body>
